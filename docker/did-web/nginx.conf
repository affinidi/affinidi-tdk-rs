# Static did:web host for the test stack. Serves the committed DID document at
# /.well-known/did.json so `did:web:localhost%3A8080` resolves against the
# composed stack. TEST-ONLY.
server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;

    location / {
        # did:web resolvers are commonly browser-based; allow cross-origin reads.
        add_header Access-Control-Allow-Origin *;
        default_type application/json;
        try_files $uri $uri/ =404;
    }
}
