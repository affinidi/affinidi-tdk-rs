[package]
name = "affinidi-siopv2"
description = "Self-Issued OpenID Provider v2 (SIOPv2) for decentralized authentication."
version = "0.1.0"
edition.workspace = true
authors.workspace = true
readme = "README.md"
homepage.workspace = true
license.workspace = true
keywords = ["ssi", "affinidi", "siopv2", "openid", "self-issued"]
repository.workspace = true
publish.workspace = true
rust-version.workspace = true

[[example]]
name = "siop_authentication"
path = "examples/siop_authentication.rs"

[[example]]
name = "did_authentication"
path = "examples/did_authentication.rs"

[dependencies]
affinidi-oid4vc-core = { version = "0.1", path = "../affinidi-oid4vc-core" }

base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
thiserror = "2.0"
tracing = "0.1"
url = "2.5"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
