[package]
name = "affinidi-oid4vc-core"
description = "Shared types for the OpenID for Verifiable Credentials (OID4VC) protocol family."
version = "0.1.1"
edition.workspace = true
authors.workspace = true
readme = "README.md"
homepage.workspace = true
license.workspace = true
keywords = ["ssi", "affinidi", "openid4vc", "siopv2"]
repository.workspace = true
publish.workspace = true
rust-version.workspace = true

[features]
default = ["es256"]
_test-utils = []
es256 = ["dep:p256"]

[dependencies]
base64 = "0.22"
p256 = { version = "0.13", features = ["ecdsa", "arithmetic"], optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
url = "2"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
