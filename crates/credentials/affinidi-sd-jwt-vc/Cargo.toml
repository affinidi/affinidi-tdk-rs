[package]
name = "affinidi-sd-jwt-vc"
description = "SD-JWT-based Verifiable Credentials (SD-JWT VC) per IETF draft-ietf-oauth-sd-jwt-vc."
version = "0.1.0"
edition.workspace = true
authors.workspace = true
readme = "README.md"
homepage.workspace = true
license.workspace = true
keywords = ["ssi", "affinidi", "sd-jwt-vc", "credentials"]
repository.workspace = true
publish = false
rust-version.workspace = true

[features]
default = []
_test-utils = ["affinidi-sd-jwt/_test-utils"]

[dependencies]
affinidi-sd-jwt = { version = "0.1", path = "../affinidi-sd-jwt" }

chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"

[dev-dependencies]
affinidi-sd-jwt-vc = { path = ".", features = ["_test-utils"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
