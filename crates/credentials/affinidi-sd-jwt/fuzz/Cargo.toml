[package]
name = "affinidi-sd-jwt-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"
# `_test-utils` exposes the HMAC signer/verifier used for seed generation and
# the verify target. sd-jwt has no internal path deps, so no patch is needed.
affinidi-sd-jwt = { path = "..", features = ["_test-utils"] }

[[bin]]
name = "parse"
path = "fuzz_targets/parse.rs"
test = false
doc = false
bench = false

[[bin]]
name = "verify"
path = "fuzz_targets/verify.rs"
test = false
doc = false
bench = false

# Standalone workspace: cargo-fuzz needs nightly, the parent pins stable 1.95.0.
[workspace]
