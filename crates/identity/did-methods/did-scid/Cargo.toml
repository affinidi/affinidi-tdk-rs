
[package]
name = "did-scid"
version = "0.1.6"
description = "Implementation of did:scid in Rust"
repository.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
publish.workspace = true
license.workspace = true
readme = "README.md"
rust-version.workspace = true

[features]
default = ["did-webvh", "did-cheqd"]

did-cheqd = ["dep:did-resolver-cheqd"]
did-webvh = ["dep:didwebvh-rs"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
affinidi-did-common = "0.3"

didwebvh-rs = { version = "0.4", optional = true }
did-resolver-cheqd = { version = "1", optional = true }
regex = "1"
serde_json = "1"
ssi-dids-core = "0.1"
thiserror = "2"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
