### log_level: trace debug info warn error
### default: info
log_level = "info"

### listen_address: <ip_address>:<tcp_port> that this service will listen on.
### Default: 0.0.0.0:8080
listen_address = "${LISTEN_ADDRESS:0.0.0.0:8080}"

### statistics_interval: # of seconds between statistics logging
### Default: 60 second
statistics_interval = "${STATISTICS_INTERVAL:10}"

### resolve_timeout: max seconds a single upstream DID resolution may take
### before the request path gives up and returns an error (rather than
### blocking the HTTP request / WebSocket connection on a hung upstream).
### Default: 30 seconds
resolve_timeout = "${RESOLVE_TIMEOUT:30}"

### max_did_size: maximum accepted DID length in bytes. Longer DIDs are
### rejected before resolution (HTTP 400 / WebSocket error) so a crafted
### request can't drive unbounded work. Also bounds the WebSocket frame size.
### Default: 1024 bytes
max_did_size = "${MAX_DID_SIZE:1024}"

### enable_http_endpoint: true/false
### Default: true
### If true, the server will make available /resolve endpoint for HTTP GET requests
### that will resolve a DID Document from the cache.
enable_http_endpoint = "${ENABLE_HTTP_ENDPOINT:true}"

### enable_websocket_endpoint: true/false
### Default: true
### If true, the server will make available /resolve endpoint for websocket requests
### that will resolve a DID Document from the cache.
# Agent name (DID shortcut) lookup: GET /did/v1/resolve-name/{*name}
#
# OFF BY DEFAULT. Enabling it lets callers make this server issue HTTP requests
# to hosts of their choosing. The resolver refuses non-public addresses
# (loopback, private, link-local, cloud metadata) on every redirect hop, but
# that is not complete SSRF protection: DNS rebinding remains possible, and this
# server has no rate limiting. Enable only if you accept that.
enable_agent_names = "${ENABLE_AGENT_NAMES:false}"

# Ceiling on agent name lookups fetching upstream at once.
#
# Agent name resolution turns one cheap inbound request into one outbound
# request to a host the CALLER chose. Without a ceiling that is an amplification
# primitive: this server can be driven to fan out traffic at third parties, or
# to scan them, at a cost of one request each. The cap bounds that fan-out
# however many source addresses the load arrives from. Requests over it are shed
# with 503 rather than queued, so a saturated server does not accumulate an
# unbounded backlog of pending fetches.
agent_name_concurrency = "${AGENT_NAME_CONCURRENCY:16}"

enable_websocket_endpoint = "${ENABLE_WEBSOCKET_ENDPOINT:true}"

[cache]
### capacity_count: Approx how many items to cache in memory
### Default: ~1,000 cached DID Documents
capacity_count = "${CACHE_CAPACITY_COUNT:1000}"

### expire: Cache Time To Live (TTL) for a cached entry in seconds
### Default: 300 (5 minutes)
expire = "${EXPIRE:300}"
