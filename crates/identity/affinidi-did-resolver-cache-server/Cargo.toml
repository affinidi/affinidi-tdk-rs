[package]
name = "affinidi-did-resolver-cache-server"
version = "0.7.4"
description = "Affinidi DID Network Cache + Resolver Service"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
rust-version.workspace = true

[features]
# `network` enables the WebSocket resolver endpoint on /ws, which is the
# default transport for `affinidi-did-resolver-cache-sdk` clients. Disable it
# (with `--no-default-features`) to build an HTTP-only cache server that only
# exposes /resolve/{did} and the health endpoints.
default = ["network"]
network = ["affinidi-did-resolver-cache-sdk/network"]

[dependencies]
# Affinidi Crates
affinidi-did-resolver-cache-sdk = { version = "0.8", default-features = true, path = "../affinidi-did-resolver-cache-sdk/" }
affinidi-did-common = "0.3"

didwebvh-rs = "0.5"

# External Crates
ahash = "0.8"
reqwest = { version = "0.13", default-features = false, features = [
  "rustls",
] }
axum = { version = "0.8", features = ["ws"] }
axum-server = { version = "0.8", features = ["tls-rustls"] }
chrono = "0.4"
clap = { version = "4", features = ["derive"] }
http = "1"
moka = { version = "0.12", features = ["future"] }
rand = "0.10"
regex = "1"
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
toml = "1"
tower-http = { version = "0.6", features = ["cors", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
affinidi-secrets-resolver = "0.5"

[lints]
workspace = true
