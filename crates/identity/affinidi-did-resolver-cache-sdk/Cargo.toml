[package]
name = "affinidi-did-resolver-cache-sdk"
version = "0.8.6"
description = "Affinidi DID Resolver SDK"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
rust-version.workspace = true

[lib]
crate-type = ["rlib", "cdylib"]

[features]
default = ["local", "did-methods"]
local = []
network = [
  "dep:web-socket",
  "dep:url",
  "dep:sha1",
  "dep:base64",
  "dep:tokio-rustls",
  "dep:rustls",
  "dep:rustls-platform-verifier",
  "tokio/net",
  "tokio/io-util",
]
did-methods = ["did-cheqd", "did-webvh", "did-scid"]
did_example = ["dep:did-example"]
did-jwk = ["dep:did-jwk"]
did-cheqd = ["dep:did-resolver-cheqd"]
did-webvh = ["dep:didwebvh-rs"]
did-scid = ["dep:did-scid"]
did-ebsi = ["dep:did-ebsi"]

[dependencies]
# Affinidi Crates
affinidi-did-common = "0.3"
affinidi-did-resolver-traits = { version = "0.1", path = "../affinidi-did-resolver-traits" }
did-example = { version = "0.5", optional = true }
did-scid = { version = "0.1", optional = true }
did-ebsi = { version = "0.1", path = "../did-methods/did-ebsi", optional = true }

# External Crates
ahash = "0.8"
base64 = { version = "0.22", optional = true }
didwebvh-rs = { version = "0.5", optional = true }
highway = "1"
moka = { version = "0.12", features = ["future"] }
rand = "0.10"
rustls = { version = "0.23", default-features = false, features = [
  "aws_lc_rs",
  "tls12",
], optional = true }
rustls-platform-verifier = { version = "0.6", optional = true }
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"
sha1 = { version = "0.10", optional = true }
affinidi-did-web = { version = "0.1", path = "../did-methods/did-web" }
did-ethr = "0.3"
did-jwk = { version = "0.2", optional = true }
did-pkh = "0.3"
ssi-dids-core = "0.1"
did-resolver-cheqd = { version = "1", optional = true }
thiserror = "2"
tokio = { version = "1", features = ["rt", "sync", "time", "macros"] }
tokio-rustls = { version = "0.26", optional = true }
tracing = "0.1"
url = { version = "2", optional = true }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-socket = { version = "0.7", optional = true }

[dev-dependencies]
affinidi-crypto = "0.1"
affinidi-secrets-resolver = "0.5"
futures-util = "0.3"
tokio = { version = "1", features = ["full"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2"
clap = { version = "4", features = ["derive"] }
num-format = "0.4"
number_prefix = "0.4"
rayon = "1"

[lints]
workspace = true
