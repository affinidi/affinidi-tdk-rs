[package]
name = "affinidi-tdk-test-support"
version = "0.3.0"
description = "Shared in-process test fixtures and harnesses for the Affinidi TDK workspace"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
readme = "README.md"
# Scaffold only — flipped to `true` once the fixture API stabilises (TI-series)
# so external consumers can pull it in as a dev-dependency. Empty crates should
# not hit crates.io.
publish = false

[dependencies]
# ── TI2: did:web/webvh mock server + StaticResolver ──────────────────────
## `DID`/`Document` types and the resolver traits the StaticResolver implements.
## Path + explicit version so the crate stays publishable once the API settles.
affinidi-did-common = { version = "0.3", path = "../../identity/affinidi-did-common" }
affinidi-did-resolver-traits = { version = "0.1", path = "../../identity/affinidi-did-resolver-traits" }
## In-process HTTP server backing MockDidWebServer.
axum = "0.8"
tokio = { workspace = true, features = [
  "rt",
  "rt-multi-thread",
  "net",
  "time",
  "sync",
  "macros",
] }
serde_json = "1"
tracing = "0.1"
thiserror = "2"

# ── TI5: CredentialScenario (sd-jwt-vc issue/present/verify + status list) ─
## sd-jwt-vc lives at `affinidi_vc::sd_jwt_vc`; sd-jwt provides the holder
## present / verifier APIs + the SdHasher; status-list backs revocation.
affinidi-vc = { version = "0.2", path = "../../credentials/affinidi-vc" }
affinidi-sd-jwt = { version = "0.1", path = "../../credentials/affinidi-sd-jwt" }
affinidi-status-list = { version = "0.1", path = "../../credentials/affinidi-status-list" }
## `ed25519_pub_to_did_key` for deterministic issuer/holder/verifier DIDs.
affinidi-crypto = { version = "0.2", path = "../../core/affinidi-crypto" }
## EdDSA signer/verifier backing the scenario's JWS signing (the workspace
## sd-jwt crate ships only an HMAC test signer).
ed25519-dalek = { version = "2" }
base64 = "0.22"

# Later tasks add their own deps as each harness lands:
#   TI4  seeded did:peer + clock      → affinidi-tdk, secrets-resolver
#   TI7  shared vectors/ loader       → serde

[dev-dependencies]
## Drives the mock server over HTTP in the crate's own tests.
reqwest = { version = "0.13", default-features = false, features = [
  "rustls",
  "json",
] }
## `test-util` enables `#[tokio::test(start_paused = true)]` for the
## virtual-clock delay/hang tests.
tokio = { workspace = true, features = ["test-util", "macros", "rt-multi-thread"] }

[lints]
workspace = true
