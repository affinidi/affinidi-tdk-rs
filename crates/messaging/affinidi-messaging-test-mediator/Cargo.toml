[package]
name = "affinidi-messaging-test-mediator"
version = "0.2.40"
description = "Embedded mediator fixture for integration tests against affinidi-messaging-mediator"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
readme = "README.md"
publish = true

[features]
default = []
## Compile in `FjallStore` so tests can run the e2e suite against the
## on-disk LSM backend in addition to `MemoryStore` (which is always
## available). Adds a few hundred ms to test-binary build time and
## pulls in fjall + tempfile, so it's opt-in.
fjall-backend = ["affinidi-messaging-mediator/fjall-backend", "dep:tempfile"]
## Spawn the mediator with TSP support and expose `atm.tsp()` so the e2e suite
## can exercise the dual-protocol (DIDComm + TSP) flows.
tsp = ["affinidi-messaging-mediator/tsp", "affinidi-messaging-sdk/tsp"]

[dependencies]
# ── Mediator: the thing we're spawning ───────────────────────────────────
##
## Sister-crate path deps carry an explicit `version =` so the package
## is publishable to crates.io while still using the in-tree path for
## workspace dev-builds. Pins follow the workspace's caret-pin policy
## (major.minor only) so transitive patch fixes resolve automatically.
affinidi-messaging-mediator = { version = "0.17", path = "../affinidi-messaging-mediator", default-features = false, features = ["didcomm", "memory-backend"] }
# `test-clock` compiles the advanceable `TestClock` this fixture injects via
# `TestMediatorBuilder::clock` for fast expiry/TTL tests.
affinidi-messaging-mediator-common = { version = "0.15", path = "../affinidi-messaging-mediator/affinidi-messaging-mediator-common", features = [
  "test-clock",
] }

# ── Optional: Fjall on-disk backend support (gated on `fjall-backend`) ──
## Wraps each FjallStore in a temp directory that's cleaned up when the
## handle drops, so tests don't leak partition files on disk.
tempfile = { version = "3", optional = true }

# ── DID + key generation ────────────────────────────────────────────────
## Used for `DID::generate_did_peer` (Ed25519 + X25519, with service URI).
affinidi-tdk = { version = "0.8", path = "../../tdk/affinidi-tdk", default-features = false, features = ["did-peer"] }
affinidi-secrets-resolver = { version = "0.5", path = "../../core/affinidi-secrets-resolver" }
affinidi-did-resolver-cache-sdk = { version = "0.8", path = "../../identity/affinidi-did-resolver-cache-sdk" }

# ── SDK client (for the e2e test environment) ───────────────────────────
affinidi-messaging-sdk = { version = "0.18", path = "../affinidi-messaging-sdk" }

# ── JWT signing key generation for the test mediator's session tokens ───
jsonwebtoken = { version = "10", features = ["aws_lc_rs"] }
ring = { version = "0.17", features = ["std"] }

# ── rustls: needed to install a `CryptoProvider` at fixture startup so
##     downstream test code that mixes provider features doesn't panic
##     on the first WS handshake. Tracks the mediator's pinned version
##     so the provider type matches across the workspace.
rustls = { version = "0.23", default-features = false, features = ["aws_lc_rs", "tls12"] }

# ── Async + lifecycle ───────────────────────────────────────────────────
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time", "net"] }
tokio-util = "0.7"
async-trait = "0.1"

# ── Errors + utility ────────────────────────────────────────────────────
thiserror = "2"
tracing = "0.1"
url = "2"
uuid = { version = "1", features = ["v4", "fast-rng"] }
## Used to hash DIDs into their canonical account-store key shape when
## pre-registering local DIDs at startup.
sha256 = "1"
## `serde_json` + the DIDComm `Message` builder back the `TestTopology`
## forwarding helper, which constructs the routing-2.0 double forward in
## library code (the SDK doesn't re-export `Message`).
serde_json = "1"
affinidi-messaging-didcomm = { version = "0.15", path = "../affinidi-messaging-didcomm" }

[dev-dependencies]
## Used by integration tests to hit the mediator's HTTP endpoints
## without going through the SDK.
reqwest = { version = "0.13", features = ["rustls", "json"] }
## TSP control-message types named by the TSP control-relay integration test.
affinidi-tsp = { version = "0.1", path = "../affinidi-tsp" }
## Re-encode raw qb2 bytes from a flushed TSP websocket Binary frame back to
## the stored base64url form so the SDK can unpack it (tsp_websocket test).
base64 = "0.22"
## Trust Tasks payload types named by the Trust Tasks integration tests.
trust-tasks-rs = "0.2"
## Tracing subscriber for test diagnostics.
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
## WebSocket handshake test.
tokio-tungstenite = { version = "0.29", features = ["rustls-tls-native-roots"] }
## `StreamExt::next` to read frames from a `tokio-tungstenite` WebSocket
## stream (per-DID connection-cap test reads the server's Close frame).
futures-util = "0.3"
## `io-util` for the raw-socket WebSocket handshake test (the bearer-only
## browser scenario can't go through tokio-tungstenite's client, which
## errors when it offers a subprotocol the server doesn't echo back).
tokio = { workspace = true, features = ["io-util"] }

[lints]
workspace = true
