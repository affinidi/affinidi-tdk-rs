[package]
name = "affinidi-messaging-delivery"
description = "Reliable messaging delivery layer (durable outbox + drain) over the MessageTransport trait"
version = "0.1.5"
edition.workspace = true
authors.workspace = true
readme = "README.md"
homepage.workspace = true
license.workspace = true
keywords.workspace = true
repository.workspace = true
publish.workspace = true
rust-version.workspace = true

[dependencies]
# The transport-agnostic contract the delivery layer builds reliability on.
affinidi-messaging-core = { path = "../affinidi-messaging-core", version = "0.1.5" }
async-trait = "0.1"
thiserror = "2"
tracing = "0.1"
futures-util = "0.3"
# The layer-receipt (§5a) wire body is a tiny typed JSON message.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# `MessagingService` spawns the inbound dispatcher (`rt`) and uses
# broadcast/oneshot/watch (`sync`); the drain uses `time`.
tokio = { version = "1", default-features = false, features = ["rt", "sync", "time"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "time", "sync"] }

[lints]
workspace = true
