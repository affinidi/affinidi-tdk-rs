### Mediator Configuration
###
### Every setting can be overridden by an environment variable.
### The env var name is shown in the "Env:" line above each field.
### Environment variables take priority over values in this file.

### log_level: trace debug info warn error
### NOTE: RUST_LOG environment variable can also override this setting
log_level = "info"

### Env: LOG_JSON
### If true, log output will be in JSON format
log_json = "false"

### Env: MEDIATOR_DID
### DID of the mediator (REQUIRED)
### Supported formats:
###   did://<did_string>
###   aws_parameter_store://<parameter_name>
###   vta://<context>  (requires [vta] section)
mediator_did = "vta://mediator-local"

### ****************************************************************************************************************************
### VTA (Verifiable Trust Agent) integration
### Enables centralized key management via a VTA instance.
### When configured, set mediator_did and/or security.mediator_secrets to "vta://<context>"
###
### Example:
###   mediator_did = "vta://mediator"
###   [security]
###   mediator_secrets = "vta://mediator"
### ****************************************************************************************************************************
[vta]
credential = "keyring://affinidi-mediator/vta-credential"
context = "mediator-local"
### ****************************************************************************************************************************
### Server configuration
### ****************************************************************************************************************************
[server]
### Env: LISTEN_ADDRESS
### <ip_address>:<tcp_port> that this service will listen on
listen_address = "0.0.0.0:7037"

### Env: API_PREFIX
### API prefix
api_prefix = "/mediator/v1/"

### Env: ADMIN_DID
### DID of the admin (REQUIRED)
### NOTE: It is strongly recommended to NOT use the same DID as the mediator!
###       This causes more use cases where the secrets of the mediator itself can be exposed in administration tasks.
### NOTE: You can add additional admin DIDs after startup via the DIDComm admin protocol
admin_did = "did://did:peer:2.Vz6MkksX9huJxJwvLtj9vc3gXbT2m1WVy4Uoi3ssEiSSH2ZYJ.EzQ3shVZJV9gKezYsvy5tC1LCwjjWSms2zCfZhvnRK48BNoHH3"

### Env: DID_WEB_SELF_HOSTED
### Path to the self-hosted DID Document
### Supported formats:
###   file://<path>
###   aws_parameter_store://<parameter_name>
### When enabled, adds a did:web route at /.well-known/did.json
did_web_self_hosted = "file://./conf/mediator_did.json"

### ****************************************************************************************************************************
### Database configuration
### ****************************************************************************************************************************
[database]
### Env: DATABASE_FUNCTIONS_FILE
### Path to the database functions file
functions_file = "./conf/atm-functions.lua"

### Env: DATABASE_URL
### URL of the Redis compatible database
### Supported schemes:
###   redis://127.0.0.1/                    — local, no auth (dev only)
###   redis://:password@host:6379/          — with password authentication
###   redis://user:password@host:6379/      — with ACL user + password
###   rediss://:password@host:6379/         — TLS encrypted connection
###   redis://127.0.0.1/1                   — use database partition 1
### SECURITY: Always use authentication (requirepass or ACLs) in production.
### For remote Redis, use rediss:// (TLS) to encrypt data in transit.
database_url = "redis://127.0.0.1/"

### Env: DATABASE_POOL_SIZE
### DEPRECATED - ignored, kept for backwards compatibility
database_pool_size = "10"

### Env: DATABASE_TIMEOUT
### Timeout for database operations in seconds
database_timeout = "2"

### ****************************************************************************************************************************
### Security configuration
### ****************************************************************************************************************************
[security]
### Env: MEDIATOR_ACL_MODE
### ACL logic mode: explicit_deny | explicit_allow
mediator_acl_mode = "explicit_allow"

### Env: GLOBAL_DEFAULT_ACL
### Default ACL applied to new/unknown DIDs
### NOTE: ALLOW_ALL or DENY_ALL must always be first, followed by comma-separated flags
### Flags: LOCAL, SEND_MESSAGES, RECEIVE_MESSAGES, SEND_FORWARDED, RECEIVE_FORWARDED,
###        CREATE_INVITES, ANON_RECEIVE, SELF_MANAGE_LIST, SELF_MANAGE_SEND_QUEUE_LIMIT,
###        SELF_MANAGE_RECEIVE_QUEUE_LIMIT (and _CHANGE variants)
global_acl_default = "DENY_ALL,LOCAL,SEND_MESSAGES,RECEIVE_MESSAGES"

### Env: LOCAL_DIRECT_DELIVERY_ALLOWED
### If true, messages addressed directly to a local DID will be delivered
local_direct_delivery_allowed = "true"

### Env: LOCAL_DIRECT_DELIVERY_ALLOW_ANON
### If true, anonymous messages can be delivered directly to a local DID
local_direct_delivery_allow_anon = "false"

### Env: MEDIATOR_SECRETS
### Location of mediator secrets (REQUIRED)
### Supported formats:
###   file://<path>
###   aws_secrets://<secret_name>
###   vta://<context>  (requires [vta] section)
### NOTE: Key identifiers (id) must match the key identifiers in the mediator DID document
mediator_secrets = "vta://mediator-local"

### Env: USE_SSL
### If true, SSL is enabled. Set to false only if TLS is terminated externally
use_ssl = "false"

### Env: SSL_CERTIFICATE_FILE
### Path to the SSL certificate file
ssl_certificate_file = "conf/keys/end.cert"

### Env: SSL_KEY_FILE
### Path to the SSL certificate key file
ssl_key_file = "conf/keys/end.key"

### Env: JWT_AUTHORIZATION_SECRET
### Key used to sign JWT tokens (REQUIRED)
### Supported formats: string://<key> | aws_secrets://<secret_name>
jwt_authorization_secret = "string://MFECAQEwBQYDK2VwBCIEIIsgJfWwqWvy-_EbTy1OMMY1t5fex1UGUXVDfjdd30I6gSEArzZVXBELy8m4ICDLe9mIkr7qLJMxmEpDrE8WpfdcLeA"

### Env: JWT_ACCESS_EXPIRY
### Expiry time in seconds for JWT access tokens (minimum: 10)
jwt_access_expiry = "900"

### Env: JWT_REFRESH_EXPIRY
### Expiry time in seconds for JWT refresh tokens
jwt_refresh_expiry = "86400"

### Env: CORS_ALLOW_ORIGIN
### Comma separated list of allowed origins. Use * for all origins
### Example: "https://affinidi.com,https://example2.com"
# cors_allow_origin = "https://affinidi.com"

### Env: BLOCK_ANONYMOUS_OUTER_ENVELOPE
### If true, all messages sent to the mediator must be signed
block_anonymous_outer_envelope = "true"

### Env: FORCE_SESSION_DID_MATCH
### If true, the signing DID in the outer envelope MUST match the session DID
### Must be false if block_anonymous_outer_envelope is false
force_session_did_match = "true"

### Env: BLOCK_REMOTE_ADMIN_MSGS
### If true, admin messages must be delivered directly (not via another mediator)
block_remote_admin_msgs = "true"

### Env: ADMIN_MESSAGES_EXPIRY
### TTL in seconds for admin messages (minimizes replay attack risk)
admin_messages_expiry = "3"

### ****************************************************************************************************************************
### Live streaming setup
### ****************************************************************************************************************************
[streaming]
### Env: STREAMING_ENABLED
### If true, enables live message streaming via WebSockets
enabled = "true"

### Env: STREAMING_UUID
### Unique identifier for this subscriber instance
### Formats: hostname:// | string://<uuid>
uuid = "hostname://"

### ****************************************************************************************************************************
### DID Resolver configuration
### ****************************************************************************************************************************
[did_resolver]
### Env: DID_RESOLVER_ADDRESS
### Address of the DID resolver service (omit to use local resolver)
# address = "ws://127.0.0.1:8080/did/v1/ws"

### Env: DID_RESOLVER_CACHE_CAPACITY
### Number of DIDs to cache in memory
cache_capacity = "1000"

### Env: DID_RESOLVER_CACHE_TTL
### TTL in seconds for cached DIDs
cache_ttl = "300"

### Env: DID_RESOLVER_NETWORK_TIMEOUT
### Timeout in milliseconds for DID resolution (account for blockchain latency)
network_timeout = "5000"

### Env: DID_RESOLVER_NETWORK_LIMIT
### Maximum concurrent DID resolution requests
network_limit = "100"

### ****************************************************************************************************************************
### Resource limits
### ****************************************************************************************************************************
[limits]
### Env: LIMIT_ATTACHMENTS_MAX_COUNT
attachments_max_count = "20"

### Env: LIMIT_CRYPTO_OPERATIONS_PER_MESSAGE
### Protects against DoS attacks via excessive crypto operations
crypto_operations_per_message = "1000"

### Env: LIMIT_DELETED_MESSAGES
### Maximum messages that can be deleted at once
deleted_messages = "100"

### Env: LIMIT_FORWARD_TASK_QUEUE
### Maximum queued forward tasks
forward_task_queue = "50000"

### Env: LIMIT_HTTP_SIZE
### Maximum HTTP request payload in bytes (10MB)
http_size = "10485760"

### Env: LIMIT_LISTED_MESSAGES
### Maximum messages listed at a time
listed_messages = "100"

### Env: LIMIT_LOCAL_MAX_ACL
### Maximum ACL entries per DID
local_max_acl = "1000"

### Env: LIMIT_MESSAGE_EXPIRY_SECONDS
### TTL in seconds for stored messages (7 days)
message_expiry_seconds = "604800"

### Env: LIMIT_MESSAGE_SIZE
### Maximum message size in bytes (1MB)
message_size = "1048576"

### Env: LIMIT_QUEUED_SEND_MESSAGES_SOFT
### Default outbound queue limit per DID (-1 = no limit)
queued_send_messages_soft = "200"

### Env: LIMIT_QUEUED_SEND_MESSAGES_HARD
### Maximum outbound queue limit settable by non-admin (-1 = no limit)
queued_send_messages_hard = "1000"

### Env: LIMIT_QUEUED_RECEIVE_MESSAGES_SOFT
### Default inbound queue limit per DID (-1 = no limit)
queued_receive_messages_soft = "200"

### Env: LIMIT_QUEUED_RECEIVE_MESSAGES_HARD
### Maximum inbound queue limit settable by non-admin (-1 = no limit)
queued_receive_messages_hard = "1000"

### Env: LIMIT_TO_KEYS_PER_DID
### Maximum keys per recipient DID (DoS protection)
to_keys_per_recipient = "100"

### Env: LIMIT_TO_RECIPIENTS
### Maximum recipients per message (DoS protection)
to_recipients = "100"

### Env: LIMIT_WS_SIZE
### Maximum WebSocket payload in bytes (10MB)
ws_size = "10485760"

### Env: ACCESS_LIST_LIMIT
### Maximum access list entries per DID
access_list_limit = "1000"

### Env: OOB_INVITE_TTL
### TTL in seconds for OOB invites
oob_invite_ttl = "86400"

### Env: LIMIT_RATE_LIMIT_PER_IP
### Requests per second per IP (0 = disabled)
# rate_limit_per_ip = "100"

### Env: LIMIT_RATE_LIMIT_BURST
### Burst size for IP-based rate limiting
# rate_limit_burst = "50"

### Env: LIMIT_MAX_WEBSOCKET_CONNECTIONS
### Maximum concurrent WebSocket connections (0 = unlimited)
# max_websocket_connections = "10000"

### Env: LIMIT_DID_RATE_LIMIT_PER_SECOND
### Requests per second per authenticated DID (0 = disabled)
# did_rate_limit_per_second = "0"

### Env: LIMIT_DID_RATE_LIMIT_BURST
### Burst size for per-DID rate limiting
# did_rate_limit_burst = "10"

### ****************************************************************************************************************************
### Forwarding processor configuration
### ****************************************************************************************************************************
[processors.forwarding]
### Env: PROCESSOR_FORWARDING_ENABLED
### Enable the local forwarding processor
enabled = "true"

### Env: PROCESSOR_FORWARDING_FUTURE_TIME_LIMIT
### Maximum seconds a message can be scheduled in the future
future_time_limit = "86400"

### Env: PROCESSOR_FORWARDING_EXTERNAL
### If true, forward messages to external mediators/endpoints
external_forwarding = "true"

### Env: PROCESSOR_FORWARDING_REPORT_ERRORS
### If true, generate problem reports for failed forwarding
report_errors = "true"

### Env: PROCESSOR_FORWARDING_BLOCKED_DIDS
### Additional DIDs to block forwarding to (JSON array)
### Always includes the mediator's own DID
blocked_forwarding_dids = "[]"

### Env: PROCESSOR_FORWARDING_RATE_WINDOW
### Sliding window in seconds for endpoint message rate tracking
rate_window_seconds = "300"

### Env: PROCESSOR_FORWARDING_WS_THRESHOLD
### Messages per 10s threshold to prefer WebSocket over REST
ws_threshold_msgs_per_10s = "1"

### Env: PROCESSOR_FORWARDING_WS_IDLE_TIMEOUT
### Seconds of idle time before disconnecting a remote WebSocket
ws_idle_timeout_seconds = "60"

### Env: PROCESSOR_FORWARDING_BATCH_SIZE
### Messages per batch from the forwarding queue
batch_size = "50"

### Env: PROCESSOR_FORWARDING_MAX_RETRIES
### Maximum retry attempts for failed forwarding
max_retries = "5"

### Env: PROCESSOR_FORWARDING_INITIAL_BACKOFF_MS
### Initial backoff delay in milliseconds
initial_backoff_ms = "1000"

### Env: PROCESSOR_FORWARDING_MAX_BACKOFF_MS
### Maximum backoff delay in milliseconds
max_backoff_ms = "60000"

### Env: PROCESSOR_FORWARDING_CONSUMER_GROUP
### Redis consumer group name (shared across processor instances)
consumer_group = "forwarding"

[processors.message_expiry_cleanup]
### Env: PROCESSOR_MESSAGE_EXPIRY_CLEANUP_ENABLED
### Enable the message expiry cleanup processor
enabled = "true"