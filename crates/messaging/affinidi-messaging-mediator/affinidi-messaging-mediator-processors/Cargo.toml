[package]
name = "affinidi-messaging-mediator-processors"
version = "0.13.0"
description = "Standalone background processor binaries for the Affinidi Messaging Mediator (Redis-only, horizontal scaling)"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
publish.workspace = true
license.workspace = true
readme = "README.md"
rust-version.workspace = true
repository.workspace = true

[lib]
path = "src/lib/lib.rs"

## Standalone binary for message expiry cleanup. Reuses the trait-based
## sweep loop in mediator-common; this crate just wires config to the
## RedisStore constructor.
[[bin]]
name = "message_expiry_cleanup"
path = "src/message_expiry_cleanup/main.rs"

## Standalone binary for the forwarding processor. Reuses
## `mediator-common::tasks::forwarding::ForwardingProcessor` directly
## — same code that runs in-process inside the mediator.
[[bin]]
name = "forwarding_processor"
path = "src/forwarding/main.rs"

[dependencies]
# ── Affinidi Crates ──────────────────────────────────────────────────────
## Shared types + RedisStore (trait-based backend) + ForwardingProcessor.
## Standalone binaries here are Redis-only by design, so the
## `redis-backend` feature is always enabled. The unified processor
## logic now lives in this crate; no duplicated implementation here.
affinidi-messaging-mediator-common = { version = "0.13", path = "../affinidi-messaging-mediator-common", features = ["redis-backend"] }

# ── CLI ──────────────────────────────────────────────────────────────────
clap = { version = "4", features = ["derive"] }

# ── Serialization (config TOML parsing only) ─────────────────────────────
serde = { version = "1", features = ["derive"] }
sha256 = "1"
toml = "1"

# ── Async runtime + observability ────────────────────────────────────────
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
tracing = { version = "0.1", features = ["valuable"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[lints]
workspace = true
