[package]
name = "affinidi-messaging-mediator-processors"
version = "0.12.2"
description = "Affinidi Messaging Mediator Processors"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
publish.workspace = true
license.workspace = true
readme = "README.md"
rust-version.workspace = true
repository.workspace = true

[lib]
path = "src/lib/lib.rs"

[[bin]]
name = "message_expiry_cleanup"
path = "src/message_expiry_cleanup/main.rs"

[[bin]]
name = "forwarding_processor"
path = "src/forwarding/main.rs"

[dependencies]
affinidi-messaging-mediator-common = { version = "0.12", path = "../affinidi-messaging-mediator-common" }
clap = { version = "4.5", features = ["derive"] }
deadpool-redis = { version = "0.23", features = ["rt_tokio_1"] }
lru = "0.12"
reqwest = { version = "0.13", features = ["rustls", "json"] }
serde = { version = "1.0", features = ["derive", "rc"] }
serde_json = "1.0"
sha256 = "1.6"
tokio = { workspace = true, features = ["full"] }
toml = "1"
tracing = { version = "0.1", features = ["valuable"] }
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "fmt",
  "json",
  "valuable",
] }
uuid = { version = "1.21", features = ["v4", "fast-rng"] }
