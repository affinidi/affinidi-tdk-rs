[package]
name = "affinidi-messaging-mediator-processors"
version = "0.14.0"
description = "Background processors for the Affinidi Messaging Mediator (message expiry, forwarding)"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
publish.workspace = true
license.workspace = true
readme = "README.md"
rust-version.workspace = true
repository.workspace = true

[lib]
path = "src/lib/lib.rs"

## Standalone binary for message expiry cleanup (can run separately from mediator)
[[bin]]
name = "message_expiry_cleanup"
path = "src/message_expiry_cleanup/main.rs"

## Standalone binary for forwarding processor (can run separately from mediator)
[[bin]]
name = "forwarding_processor"
path = "src/forwarding/main.rs"

[dependencies]
# ── Affinidi Crates ──────────────────────────────────────────────────────
## Shared types: DatabaseHandler, errors, config
affinidi-messaging-mediator-common = { version = "0.14", path = "../affinidi-messaging-mediator-common" }

# ── CLI (for standalone processor binaries) ──────────────────────────────
clap = { version = "4", features = ["derive"] }

# ── Database ─────────────────────────────────────────────────────────────
## Direct Redis access for stream operations (XREADGROUP, XACK, etc.)
redis = { version = "1.1", features = [
  "tokio-rustls-comp",
  "tls-rustls-insecure",
  "ahash",
] }

# ── HTTP Client (forwarding processor delivers to remote mediators) ──────
reqwest = { version = "0.13", features = ["rustls", "json"] }

# ── Serialization ────────────────────────────────────────────────────────
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
sha256 = "1"
toml = "1"

# ── Async Runtime ────────────────────────────────────────────────────────
tokio = { workspace = true, features = ["full"] }

# ── Observability ────────────────────────────────────────────────────────
tracing = { version = "0.1", features = ["valuable"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json", "valuable"] }

# ── Utilities ────────────────────────────────────────────────────────────
lru = "0.17"
uuid = { version = "1", features = ["v4", "fast-rng"] }

[lints]
workspace = true
