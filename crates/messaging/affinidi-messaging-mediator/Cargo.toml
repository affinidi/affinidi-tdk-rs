[package]
name = "affinidi-messaging-mediator"
version = "0.12.3"
description = "Messaging Mediator service for Affinidi Messaging (DIDComm and TSP)"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
publish.workspace = true
license.workspace = true
readme = "README.md"
rust-version.workspace = true
repository.workspace = true

[[bin]]
name = "mediator"
path = "src/main.rs"

[features]
default = ["didcomm"]
didcomm = [
    "dep:affinidi-messaging-didcomm",
    "dep:affinidi-encoding",
]
tsp = [
    "dep:affinidi-tsp",
]

[dependencies]
# Affinidi Crates
affinidi-messaging-sdk = { path = "../affinidi-messaging-sdk", version = "0.16" }
affinidi-messaging-didcomm = { path = "../affinidi-messaging-didcomm", version = "0.13", optional = true }
affinidi-tsp = { path = "../affinidi-tsp", version = "0.1", optional = true }
affinidi-encoding = { version = "0.1", optional = true }
affinidi-messaging-mediator-processors = { version = "0.12", path = "affinidi-messaging-mediator-processors" }
affinidi-messaging-mediator-common = { version = "0.12", path = "affinidi-messaging-mediator-common" }
affinidi-did-resolver-cache-sdk = { version = "0.8", features = ["network"] }
affinidi-did-common = "0.3"
affinidi-secrets-resolver = "0.5"

# External Crates
didwebvh-rs = "0.3.1"
ahash = { version = "0.8", features = ["serde"] }
async-convert = "1"
aws-config = "1.8"
aws-sdk-secretsmanager = "1"
aws-sdk-ssm = "1"
axum = { version = "0.8", features = ["ws"] }
axum-extra = { version = "0.12", features = ["typed-header"] }
axum-server = { version = "0.8", features = ["tls-rustls"] }
base64 = "0.22"
chrono = "0.4"
deadpool-redis = { version = "0.23", features = ["rt_tokio_1"] }
hostname = "0.4"
http = "1"
jsonwebtoken = { version = "10.3", features = ["aws_lc_rs"] }
itertools = "0.14"
num-format = "0.4.4"
rand = "0.10"
redis = { version = "1.0", features = [
  "tokio-rustls-comp",
  "tls-rustls-insecure",
  "ahash",
] }
regex = "1.12"
ring = { version = "0.17", features = ["std"] }
rustls = { version = "0.23", default-features = false, features = [
  "aws_lc_rs",
  "tls12",
] }
semver = "1.0"
serde = { version = "1.0", features = ["derive", "rc"] }
serde_json = "1.0"
sha256 = "1.6"
subtle = "2.6"
tokio = { workspace = true, features = ["full"] }
tokio-stream = "0.1"
tokio-util = "0.7"
governor = "0.8"
metrics = "0.24"
metrics-exporter-prometheus = "0.16"
toml = "1"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "limit"] }
tracing = { version = "0.1", features = ["valuable"] }
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "fmt",
  "json",
  "valuable",
] }
uuid = { version = "1.22", features = ["v4", "fast-rng"] }
reqwest = { version = "0.13", features = ["rustls", "json"] }
tokio-tungstenite = { version = "0.28", features = ["rustls-tls-native-roots"] }
futures-util = "0.3"

[dev-dependencies]
console = "0.16"
dialoguer = "0.12"
lazy_static = "1.5"
