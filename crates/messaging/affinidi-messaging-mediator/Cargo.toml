[package]
name = "affinidi-messaging-mediator"
version = "0.17.6"
description = "Messaging Mediator service for Affinidi Messaging (DIDComm and TSP)"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
publish.workspace = true
license.workspace = true
readme = "README.md"
rust-version.workspace = true
repository.workspace = true

[[bin]]
name = "mediator"
path = "src/main.rs"

[features]
## Default: DIDComm v2 protocol support + Redis storage backend + jemalloc.
## AWS integration is opt-in: use --features aws when deploying to AWS.
default = ["didcomm", "redis-backend", "jemalloc"]

## Use jemalloc as the binary's global allocator (see the dependency comment).
## On by default: with the system allocator the process holds its RSS high-water
## mark for its lifetime. Disable (`--no-default-features`) if you need to
## profile against the system allocator or are building for a target jemalloc
## doesn't support.
jemalloc = ["dep:tikv-jemallocator"]

## Storage backends for the `MediatorStore` trait. At least one must be
## enabled for the binary to function. Multiple may be enabled, but the
## binary still picks one at startup based on its config.
##
## Cross-process pub/sub (multiple mediator instances sharing a backend)
## is only supported by `redis-backend` — `fjall-backend` and
## `memory-backend` are inherently single-process. The mediator binary
## refuses to start with multi-instance config when the chosen backend
## doesn't support it.
redis-backend = ["affinidi-messaging-mediator-common/redis-backend"]
fjall-backend = ["dep:fjall"]
memory-backend = []

## DIDComm v2 — industry-standard DID-based secure messaging.
## Enables inbound/outbound message handling, authentication, and OOB discovery.
## At least one of `didcomm` or `tsp` must be enabled (see the `compile_error!`
## in `lib.rs`); the two are NOT mutually exclusive — they are designed to run
## together (`--features didcomm,tsp`), which is the dual-protocol deployment.
didcomm = ["dep:affinidi-messaging-didcomm", "dep:affinidi-encoding", "dep:affinidi-crypto", "dep:trust-tasks-rs"]

## TSP (Trust Spanning Protocol) — supported, additive alongside DIDComm. Carries TSP
## Direct / Routed / Nested / Control messages, the TSP↔DIDComm bridge, Trust Tasks over
## TSP, and advertises a TSPTransport service for discovery. Run together with `didcomm`:
## TSP currently reuses the DIDComm-authenticated session, so a `tsp`-only build has no
## auth path yet (pure-TSP `/tsp/authenticate` is pending).
tsp = ["dep:affinidi-tsp"]

## Secret storage backends — forwarded to `mediator-common`'s `secrets-*`
## features. Enabled per-deployment so operators only compile the backends
## their deployment target needs.
secrets-keyring = ["affinidi-messaging-mediator-common/secrets-keyring"]
secrets-aws = ["affinidi-messaging-mediator-common/secrets-aws", "aws"]
secrets-gcp = ["affinidi-messaging-mediator-common/secrets-gcp"]
secrets-azure = ["affinidi-messaging-mediator-common/secrets-azure"]
secrets-vault = ["affinidi-messaging-mediator-common/secrets-vault"]
secrets-k8s = ["affinidi-messaging-mediator-common/secrets-k8s"]

## AWS integration used by `did_web_self_hosted = "aws_parameter_store://..."`
## or `"s3://..."` (still loaded directly by the mediator, not via the secret
## store). Enabled automatically by `secrets-aws`.
aws = ["dep:aws-config", "dep:aws-sdk-ssm", "dep:aws-sdk-s3"]

[dependencies]
# ── Affinidi Crates ──────────────────────────────────────────────────────
# 0.18.61+: reconnect backoff no longer resets on a socket that is immediately
# closed. Pinned tighter than the usual "0.18" because a mediator built against
# an older SDK still amplifies duplicate-socket duels client-side.
affinidi-messaging-sdk = { path = "../affinidi-messaging-sdk", version = "0.18.61" }
## Optional: DIDComm v2.1 protocol implementation (activated by `didcomm` feature)
affinidi-messaging-didcomm = { path = "../affinidi-messaging-didcomm", version = "0.15", optional = true }
## Trust Tasks framework core — consumes Trust Task documents (the messaging
## ping / account / acl / access-list tasks) carried over the binding envelope.
trust-tasks-rs = { version = "0.2", optional = true }
## Optional: JOSE key-agreement types for the didcomm compat layer (#327)
affinidi-crypto = { version = "0.2", features = ["jose"], optional = true }
## Optional: Trust Spanning Protocol (activated by `tsp` feature)
affinidi-tsp = { path = "../affinidi-tsp", version = "0.1", optional = true }
## Multibase/multicodec encoding helpers (needed by didcomm for key encoding)
affinidi-encoding = { version = "0.1", optional = true }
## Shared types: DatabaseHandler, errors, config structs, secret storage.
## Backend features are enabled below via the mediator's own cargo features
## so operators only compile the backends their deployment needs.
affinidi-messaging-mediator-common = { version = "0.15.30", path = "affinidi-messaging-mediator-common" }
## Raw TOML config schema — the `*ConfigRaw` types are defined here and the
## mediator re-exports them; the runtime `Config` + conversions stay local.
affinidi-messaging-mediator-config = { version = "0.2", path = "affinidi-messaging-mediator-config" }
## Humantime for the VTA cache TTL (`[secrets].cache_ttl = "30d"`).
humantime = "2"
## CLI parsing for the mediator binary's subcommands (`mediator`,
## `mediator rotate-admin`, …). Added in Phase I — pre-Phase-I builds
## had no subcommand surface so `main.rs` skipped clap.
clap = { version = "4", features = ["derive"] }
## DID resolution with in-memory cache (capacity: 1000 DIDs, TTL: 300s)
affinidi-did-resolver-cache-sdk = { version = "0.8", features = ["network"] }
affinidi-did-common = "0.4"
affinidi-secrets-resolver = "0.5"
## Shared background-task supervision (restart-on-failure + health registry)
affinidi-task-utils = "0.1"
## VTA SDK for centralized DID/key management via Verifiable Trust Agent
vta-sdk = { version = "0.19.0", features = ["integration"] }

# ── Web Framework ────────────────────────────────────────────────────────
axum = { version = "0.8", features = ["ws"] }
axum-extra = { version = "0.12", features = ["typed-header"] }
## TLS termination for direct HTTPS (alternative: use a reverse proxy)
axum-server = { version = "0.8", features = ["tls-rustls"] }
http = "1"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "limit"] }

# ── Database (Redis) ─────────────────────────────────────────────────────
## Redis 7.1+ required. Uses multiplexed connection (not pool).
## TLS: use `rediss://` URL scheme. Auth: `redis://:password@host/`.
redis = { version = "1.2", features = [
  "tokio-rustls-comp",       # TLS via rustls (for rediss:// URLs)
  "tls-rustls-insecure",     # Allow self-signed certs (dev only, controlled by config)
  "connection-manager",      # Auto-reconnecting multiplexed connection
  "ahash",                   # Faster hashing for internal maps
] }

# ── Database (Fjall, optional) ──────────────────────────────────────────
## Embedded LSM-tree key-value store; activated by `fjall-backend` feature.
## Single-process backend for self-hosted mediators that don't want a
## separate Redis. Cross-process pub/sub is not supported (Fjall is
## inherently single-instance).
fjall = { version = "3.1", optional = true }

# ── DID Infrastructure ───────────────────────────────────────────────────
didwebvh-rs = "0.6"

# ── AWS Integration (optional, behind `aws` feature) ────────────────────
## Used for Secrets Manager (aws_secrets://), Parameter Store (aws_parameter_store://)
## To build without: --no-default-features --features didcomm
aws-config = { version = "1", optional = true }
aws-sdk-ssm = { version = "1", optional = true }
aws-sdk-s3 = { version = "1", optional = true }

# ── Cryptography & Security ─────────────────────────────────────────────
jsonwebtoken = { version = "10", features = ["aws_lc_rs"] }
ring = { version = "0.17", features = ["std"] }
rustls = { version = "0.23", default-features = false, features = ["aws_lc_rs", "tls12"] }
## Constant-time comparison for DID authorization checks
subtle = "2"

# ── Serialization & Encoding ────────────────────────────────────────────
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
base64 = "0.22"
toml = "1"
sha256 = "1"
url = "2"

# ── Async Runtime ────────────────────────────────────────────────────────
tokio = { workspace = true, features = ["full"] }
tokio-stream = "0.1"
tokio-util = "0.7"
async-convert = "1"
async-trait = "0.1"
futures-util = "0.3"

# ── Observability ────────────────────────────────────────────────────────
## Prometheus metrics via /metrics endpoint
metrics = "0.24"
metrics-exporter-prometheus = "0.18"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }

# ── Rate Limiting & Resilience ───────────────────────────────────────────
## Per-IP and per-DID rate limiting (in-memory, not distributed)
affinidi-rate-limit = "0.1"
governor = "0.10"

# ── HTTP Client (for forwarding to remote mediators) ─────────────────────
reqwest = { version = "0.13", features = ["rustls", "json"] }
tokio-tungstenite = { version = "0.29", features = ["rustls-tls-native-roots"] }

# ── Utilities ────────────────────────────────────────────────────────────
ahash = { version = "0.8", features = ["serde"] }
## Lock-free concurrent set for the streaming task's in-flight redelivery
## guard (no poison-on-panic, unlike std::sync::Mutex). Already compiled in
## the tree via `governor`.
dashmap = "6.2"
chrono = "0.4"
hostname = "0.4"
itertools = "0.14"
num-format = "0.4"
rand = "0.10"
regex = "1"
semver = "1"
uuid = { version = "1", features = ["v4", "fast-rng"] }

# ── Allocator ────────────────────────────────────────────────────────────
## jemalloc, used by the `mediator` binary only (set as the global allocator
## in main.rs — a library must never impose an allocator on its consumers).
##
## The default system allocator (glibc malloc on Linux) does not return the
## mediator's freed pages to the OS: the storage backend's write-buffer churn
## is a sawtooth of large short-lived allocations, and glibc retains those
## arenas, so RSS ratchets up to its high-water mark and stays there. That
## reads as a leak in monitoring even though the live heap is flat. jemalloc's
## decay-based purging returns the pages, so RSS tracks live memory.
##
## Not available on MSVC; the cfg gate below falls back to the system
## allocator there.
[target.'cfg(not(target_env = "msvc"))'.dependencies]
tikv-jemallocator = { version = "0.6", optional = true }

[dev-dependencies]
lazy_static = "1"
## `FjallStore` smoke tests open a temp directory.
tempfile = "3"
## `did_example` lets curve-negotiation regression tests inject local DID
## documents into the resolver without any network I/O. Feature-unified with
## the `network` build above only for test targets.
affinidi-did-resolver-cache-sdk = { version = "0.8", features = ["did_example"] }
## In-memory secrets + example DID docs for the `pack_encrypted` regression.
affinidi-secrets-resolver = "0.5"
## `test-util` enables `tokio::time::pause/advance` so the task-supervisor
## backoff tests run deterministically without real sleeps.
tokio = { workspace = true, features = ["test-util"] }
## ES256K test signing for the `verify_inner_jws` secp256k1 path (the runtime
## is verify-only, via affinidi-crypto / affinidi-messaging-didcomm).
k256 = { version = "0.13", features = ["ecdsa"] }

[lints]
workspace = true
