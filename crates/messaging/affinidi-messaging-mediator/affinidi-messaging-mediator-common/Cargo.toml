[package]
name = "affinidi-messaging-mediator-common"
version = "0.12.3"
description = "Affinidi Messaging Mediator Common Library"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
publish.workspace = true
license.workspace = true
readme = "README.md"
rust-version.workspace = true
repository.workspace = true

[dependencies]
affinidi-messaging-sdk = { path = "../../affinidi-messaging-sdk", version = "0.16" }
axum = { version = "0.8", features = ["ws"] }
rand = "0.10"
redis = { version = "1.1", features = [
  "tokio-rustls-comp",
  "tls-rustls-insecure",
  "connection-manager",
  "ahash",
] }
rustls = { version = "0.23", default-features = false, features = [
  "aws_lc_rs",
  "tls12",
] }
semver = "1.0"
serde = { version = "1.0", features = ["derive", "rc"] }
serde_json = "1.0"
thiserror = "2.0"
tracing = { version = "0.1", features = ["valuable"] }
