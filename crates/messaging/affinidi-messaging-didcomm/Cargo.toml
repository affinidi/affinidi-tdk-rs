[package]
name = "affinidi-messaging-didcomm"
description = "DIDComm v2.1 messaging implementation for the Affinidi TDK"
version = "0.15.4"
edition.workspace = true
authors.workspace = true
readme = "README.md"
homepage.workspace = true
license.workspace = true
keywords.workspace = true
repository.workspace = true
publish.workspace = true
rust-version.workspace = true

[features]
default = []
messaging-core = ["dep:affinidi-messaging-core", "dep:async-trait"]
# Off-by-default. Adds `arbitrary::Arbitrary` impls for the wire types (Message,
# Attachment, AttachmentData) for structure-aware coverage-guided fuzzing. No
# runtime/behaviour change; pull it in only from a fuzz harness or dev build.
arbitrary = ["dep:arbitrary"]

[dependencies]
# JOSE crypto primitives (#327) — this crate owns only the DIDComm/JOSE
# envelope layer; all key agreement, KDF, key-wrap, content-encryption,
# and signing live in affinidi-crypto's `jose` module.
affinidi-crypto = { version = "0.2", features = ["jose"] }

# Curve crates — still used directly by the adapter for SEC1 point
# encoding (`ToEncodedPoint`) on resolved public keys.
p256 = { version = "0.13", features = ["ecdh", "jwk"] }
k256 = { version = "0.13", features = ["ecdh", "jwk"] }

# Ed25519 — test helpers generate keys directly.
ed25519-dalek = { version = "2", features = ["rand_core"] }
sha2 = "0.10"

# Encoding / serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64ct = { version = "1", features = ["alloc"] }
url = { version = "2", features = ["serde"] }
thiserror = "2"
uuid = { version = "1", features = ["v4", "fast-rng"] }

# Misc
rand_core = { version = "0.6", features = ["getrandom"] }

# Optional — messaging-core trait integration
affinidi-messaging-core = { path = "../affinidi-messaging-core", version = "0.1", optional = true }
async-trait = { version = "0.1", optional = true }

# Optional — structure-aware fuzzing support (see the `arbitrary` feature).
arbitrary = { version = "1", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
# ECDSA signing for ES256 JWS verification tests (the runtime dep only needs
# `ecdh`/`jwk`; tests additionally sign with P-256). Cargo unifies the feature
# set so this enables `ecdsa` for test builds only.
p256 = { version = "0.13", features = ["ecdsa"] }

[lints]
workspace = true
