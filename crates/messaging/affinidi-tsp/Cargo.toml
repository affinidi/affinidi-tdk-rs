[package]
name = "affinidi-tsp"
description = "Trust Spanning Protocol (TSP) implementation for the Affinidi TDK"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
readme = "README.md"
homepage.workspace = true
license.workspace = true
keywords.workspace = true
repository.workspace = true
publish.workspace = true
rust-version.workspace = true

[features]
default = ["did-resolver"]
did-resolver = [
    "dep:affinidi-did-resolver-cache-sdk",
    "dep:affinidi-did-common",
    "dep:tokio",
]
messaging-core = ["dep:affinidi-messaging-core", "dep:async-trait"]

[dependencies]
# Affinidi crates
affinidi-cesr = { path = "../../core/affinidi-cesr" }
affinidi-messaging-core = { path = "../affinidi-messaging-core", optional = true }

# Optional Affinidi crates (for DID-based VID resolution)
affinidi-did-resolver-cache-sdk = { path = "../../identity/affinidi-did-resolver-cache-sdk", optional = true }
affinidi-did-common = { path = "../../identity/affinidi-did-common", optional = true }

# Crypto
ed25519-dalek = { version = "2.2", features = ["rand_core"] }
x25519-dalek = { version = "2.0", features = ["static_secrets"] }
hkdf = "0.12"
sha2 = "0.10"
aes-gcm = "0.10"
rand = "0.8"
zeroize = { version = "1.8", features = ["derive"] }
blake2 = "0.10"

# Encoding / serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hex = "0.4"
url = { version = "2.5", features = ["serde"] }
thiserror = "2"

# Async (optional, for DID resolution and messaging-core)
tokio = { workspace = true, features = ["sync", "macros", "rt-multi-thread"], optional = true }
async-trait = { version = "0.1", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
hex = "0.4"

[lints]
workspace = true
