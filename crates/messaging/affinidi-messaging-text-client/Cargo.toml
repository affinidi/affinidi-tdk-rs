[package]
name = "affinidi-messaging-text-client"
version = "0.12.1"
description = "Affinidi Messaging SDK"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
publish = false
license.workspace = true
readme = "README.md"
rust-version.workspace = true
repository.workspace = true

[dependencies]
# Affinidi Crates
affinidi-tdk = { path = "../../tdk/affinidi-tdk", version = "0.6" }
affinidi-messaging-sdk = { path = "../affinidi-messaging-sdk", version = "0.16" }
affinidi-messaging-didcomm = { path = "../affinidi-messaging-didcomm", version = "0.13" }
affinidi-did-resolver-cache-sdk = "0.8"

# External Crates
ahash = { version = "0.8", features = ["serde"] }
anyhow = '1.0'
base64 = "0.22"
chrono = "0.4"
circular-queue = { version = "0.2", features = ["serde_support"] }
# Crossterm must match the version used in ratatui
crossterm = { version = "0.28", features = ["event-stream"] }
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "rayon"] }
log = "0.4"
qrcode = "0.14"
rand = "0.10"
ratatui = "0.29"
ratatui-image = { version = "8", default-features = false, features = ["crossterm"] }
reqwest = { version = "0.13", features = ["rustls", "json"] }
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
sha256 = "1"
textwrap = "0.16"
tokio = { workspace = true, features = ["full"] }
tokio-stream = "0.1"
tracing = { version = "0.1", features = ["valuable"] }
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "fmt",
  "json",
  "valuable",
] }
tui-input = { version = "0.14", features = ["ratatui-crossterm"] }
tui-logger = { version = "0.17", features = ["tracing-support"] }
uuid = { version = "1", features = ["v4", "fast-rng"] }
