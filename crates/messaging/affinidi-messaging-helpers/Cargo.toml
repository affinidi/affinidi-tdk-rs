[package]
name = "affinidi-messaging-helpers"
version = "0.13.0"
description = "Affinidi Messaging Helpers"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
publish = false
license.workspace = true
readme = "README.md"
rust-version.workspace = true
repository.workspace = true

[[bin]]
name = "mediator_administration"
path = "src/mediator_administration/main.rs"

[dependencies]
# Affinidi Crates
affinidi-messaging-sdk = { path = "../affinidi-messaging-sdk", version = "0.16" }
affinidi-tdk = { path = "../../tdk/affinidi-tdk", version = "0.6" }

ahash = { version = "0.8", features = ["serde"] }
clap = { version = "4.5", features = ["derive"] }
console = "0.16"
dialoguer = "0.12"
regex = "1.12"
serde = { version = "1.0", features = ["derive", "rc"] }
serde_json = "1.0"
sha256 = "1.6"
tokio = { workspace = true, features = ["full"] }
tracing = { version = "0.1", features = ["valuable"] }
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "fmt",
  "json",
  "valuable",
] }
