[package]
name = "affinidi-messaging-helpers"
version = "0.13.0"
description = "CLI tools for Affinidi Messaging (mediator administration)"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
publish = false
license.workspace = true
readme = "README.md"
rust-version.workspace = true
repository.workspace = true

## Interactive CLI for managing mediator accounts, ACLs, and permissions.
## Requires a running mediator instance to connect to.
[[bin]]
name = "mediator_administration"
path = "src/mediator_administration/main.rs"

[dependencies]
# ── Affinidi Crates ──────────────────────────────────────────────────────
## SDK for connecting to and communicating with a running mediator
affinidi-messaging-sdk = { path = "../affinidi-messaging-sdk", version = "0.16" }
## TDK for DID resolution and crypto utilities
affinidi-tdk = { path = "../../tdk/affinidi-tdk", version = "0.6" }

# ── CLI / Interactive UI ─────────────────────────────────────────────────
clap = { version = "4", features = ["derive"] }
## Terminal prompts (Select, Input, Confirm) with color themes
console = "0.16"
dialoguer = "0.12"

# ── Serialization ────────────────────────────────────────────────────────
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
ahash = { version = "0.8", features = ["serde"] }

# ── Utilities ────────────────────────────────────────────────────────────
regex = "1"
sha256 = "1"
tokio = { workspace = true, features = ["full"] }
tracing = { version = "0.1", features = ["valuable"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json", "valuable"] }

[lints]
workspace = true
