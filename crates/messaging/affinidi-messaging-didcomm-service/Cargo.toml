[package]
name = "affinidi-messaging-didcomm-service"
version = "0.3.12"
description = "Shared DIDComm service framework for always-online DIDComm client. Manages mediator connection, message lifecycle, and handler dispatch."
edition.workspace = true
authors.workspace = true
homepage.workspace = true
license.workspace = true
keywords.workspace = true
repository.workspace = true
publish.workspace = true
readme = "README.md"
rust-version.workspace = true

[features]
## Multiplex TSP alongside DIDComm on the listener's single websocket.
## Enables the SDK's TSP surface (`atm.tsp().unpack_bytes`) used to route
## inbound TSP frames to a `TspHandler`. Off by default — a DIDComm-only build
## is unaffected.
tsp = ["affinidi-messaging-sdk/tsp"]

[dependencies]
affinidi-tdk-common = "0.6"
affinidi-messaging-sdk = "0.18"
affinidi-messaging-didcomm = "0.15"
## Trust Tasks payload types (the atm.trust_tasks() surface accepts these).
trust-tasks-rs = "0.2"
affinidi-secrets-resolver = "0.5"

async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha256 = "1"
regex = "1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = { version = "0.1", features = ["valuable"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4", "fast-rng"] }

[dev-dependencies]
affinidi-did-common = "0.3"
# Embedded mediator fixture + DID generation for the soft-restart websocket
# regression test. Sister-crate path deps carry an explicit `version =` so the
# package stays publishable while using the in-tree path for dev-builds.
affinidi-messaging-test-mediator = { version = "0.2", path = "../affinidi-messaging-test-mediator" }
affinidi-tdk = { version = "0.8", path = "../../tdk/affinidi-tdk", default-features = false, features = ["did-peer"] }


[[example]]
name = "echo_server"
path = "examples/echo_server.rs"
