# TEST harness (TI3): the PRODUCTION mediator image + Redis + a static did:web
# host.
#
#   docker compose -f docker-compose.test.yml up --build
#
# Builds docker/mediator.Dockerfile (the published image) and runs it against
# the fixed TEST-ONLY identity mounted from docker/test/conf (file:// secrets
# backend). Yields a reachable mediator at http://localhost:7037/mediator/v1/,
# a bundled Redis (not exposed), and a did:web target at
# http://localhost:8080/.well-known/did.json (did:web:localhost%3A8080).
# NEVER reuse these keys anywhere real.
#
# Smoke test: docker/smoke/smoke.sh (also driven by the compose-smoke CI job).

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mediator:
    build:
      # Repo root — the image build needs the whole workspace.
      context: .
      dockerfile: docker/mediator.Dockerfile
    image: messaging-mediator:smoke
    # Run the PRODUCTION image against the fixed TEST-ONLY identity: mount the
    # test conf (file:// secrets backend + test DID) and run from /etc/mediator
    # so the config's relative paths resolve, mirroring the test image's layout.
    working_dir: /etc/mediator
    command: ["-c", "conf/mediator.toml"]
    volumes:
      - ./docker/test/conf:/etc/mediator/conf:ro
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Mediator's view of Redis on the compose network (overrides the config).
      DATABASE_URL: redis://redis:6379/
    ports:
      - "7037:7037"
    # No container healthcheck: the production image ships without curl.
    # smoke.sh polls /mediator/v1/livez from the host instead.
    restart: unless-stopped

  did-web:
    image: nginx:alpine
    volumes:
      - ./docker/did-web/.well-known:/usr/share/nginx/html/.well-known:ro
      - ./docker/did-web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/.well-known/did.json"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
