name: publish-images

# Build and publish the mediator image from source.
#   GHCR (always)        : ghcr.io/<owner>/messaging-mediator, via GITHUB_TOKEN.
#   ECR Public (optional): mirrors the same GHCR digest; only runs when the
#                          AWS_ROLE_ARN variable is set (GitHub -> AWS OIDC).
# Multi-arch is built once on native runners and merged into one manifest list.
# The production image must build and boot-probe (verify-image) before publishing.
# Branch pushes build + verify the image only; publishing happens on release
# tags and manual dispatch.

on:
  push:
    branches:
      - ws-a-image-publish
    tags:
      - "affinidi-messaging-mediator-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag to publish (e.g. v0.16.36). Defaults to the crate version on the checked-out ref."
        required: false
        type: string

permissions:
  contents: read

env:
  IMAGE_NAME: messaging-mediator
  DOCKERFILE: docker/mediator.Dockerfile
  ECR_PUBLIC_REGISTRY: public.ecr.aws/affinidi
  ECR_PUBLIC_REGION: us-east-1

jobs:
  version:
    name: resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_latest: ${{ steps.v.outputs.is_latest }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: v
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
          CRATE_MANIFEST: crates/messaging/affinidi-messaging-mediator/Cargo.toml
        run: bash docker/ci/resolve-version.sh

  # Build the PRODUCTION image (docker/mediator.Dockerfile) and prove it boots
  # with the expected feature set. This is the gate that catches a broken
  # production image (wrong feature set, unreadable config, panics on startup)
  # before anything is published.
  verify-image:
    name: verify image boots
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build image (amd64, load locally)
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:verify
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

      - name: Boot probe
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:verify
        run: bash docker/ci/boot-probe.sh

  build:
    name: build ${{ matrix.platform }}
    needs: [version, verify-image]
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest to GHCR
        id: build
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: ${{ matrix.platform }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-ghcr:
    name: publish GHCR manifest
    needs: [version, build]
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}
    steps:
      - name: Checkout CI scripts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: docker/ci
          sparse-checkout-cone-mode: false

      - name: Download digests
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create + push manifest list
        id: manifest
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ needs.version.outputs.version }}
          IS_LATEST: ${{ needs.version.outputs.is_latest }}
        run: bash "$GITHUB_WORKSPACE/docker/ci/publish-manifest.sh"

      - name: Attest build provenance (GHCR)
        uses: actions/attest-build-provenance@520d128f165991a6c774bcb264f323e3d70747f4 # v2.2.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

  mirror-ecr-public:
    name: mirror to ECR Public
    needs: [version, publish-ghcr]
    if: ${{ (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch') && vars.AWS_ROLE_ARN != '' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout CI scripts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: docker/ci
          sparse-checkout-cone-mode: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GHCR (source)
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.ECR_PUBLIC_REGION }}

      - name: Mirror manifest GHCR -> ECR Public (same digest)
        env:
          ECR_PUBLIC_REGION: ${{ env.ECR_PUBLIC_REGION }}
          SRC: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          DST: ${{ env.ECR_PUBLIC_REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ needs.version.outputs.version }}
        run: bash docker/ci/mirror-ecr.sh

      - name: Attest build provenance (ECR Public, best-effort)
        # ECR Public's OCI 1.1 referrers support is weak; GHCR holds the
        # authoritative attestation, so a push failure here must not fail the job.
        continue-on-error: true
        uses: actions/attest-build-provenance@520d128f165991a6c774bcb264f323e3d70747f4 # v2.2.0
        with:
          subject-name: ${{ env.ECR_PUBLIC_REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ needs.publish-ghcr.outputs.digest }}
          push-to-registry: true
